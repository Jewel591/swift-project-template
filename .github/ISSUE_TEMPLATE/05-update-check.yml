name: "版本更新提示"
description: "选择版本更新检查方案"
title: "[ADR] 版本更新提示"
labels: ["prd", "增强"]
body:
  - type: markdown
    attributes:
      value: |
        ## 说明
        App Store 分发自带更新机制；直接分发（DMG/PKG）需要 Sparkle 等框架自建更新检查。

  - type: dropdown
    id: choice
    attributes:
      label: 当前项目选择
      options:
        - App Store 自动更新
        - Sparkle 框架（macOS 直接分发）
        - 手动检查 GitHub Release
        - 暂不需要
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 实施清单
      options:
        - label: 集成更新检查框架
        - label: 配置更新源（Feed URL / Release API）
        - label: 实现更新提示 UI
        - label: 测试更新流程

  - type: textarea
    id: notes
    attributes:
      label: 备注
      placeholder: "补充说明"

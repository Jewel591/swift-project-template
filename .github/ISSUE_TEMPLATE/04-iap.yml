name: "内购"
description: "选择项目的内购方案"
title: "内购"
labels: ["prd", "增强"]
body:
  - type: markdown
    attributes:
      value: |
        ## 说明
        内购用于承载 Pro 权益解锁能力，并通过付费墙向用户展示可购买权益。
        1. 统一采用 RevenueCat 进行内购管理。
        2. 付费方式可选一次性买断或订阅制；订阅制通常提供月度订阅和年度订阅两种。
        3. 可在备注中说明预期的内购价格设置。

  - type: dropdown
    id: choice
    attributes:
      label: 当前项目选择
      options:
        - 一次性买断（Lifetime）
        - 订阅制（月度 + 年度）
        - 一次性买断 + 订阅制
        - 免费（无内购）
        - 暂未确定
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 实施清单
      options:
        - label: 添加 RevenueCat SDK
        - label: 配置商品（App Store Connect + RevenueCat Dashboard）
        - label: 实现付费墙 UI
        - label: 添加 Pro 权益守卫（功能限制）
        - label: 实现购买恢复功能

  - type: textarea
    id: notes
    attributes:
      label: 备注
      placeholder: "预期价格设置、Pro 权益范围、付费墙入口位置等"

name: "Swift 项目 PRD"
description: "新建 Swift 项目的产品需求文档，填写各项技术与产品决策"
title: "[PRD] 项目名称"
labels: ["prd"]
body:
  # ── 产品概述 ──
  - type: markdown
    attributes:
      value: "# 产品概述"

  - type: input
    id: project-name
    attributes:
      label: 项目名称
      placeholder: "例如：ClaudeNotch"
    validations:
      required: true

  - type: textarea
    id: project-description
    attributes:
      label: 产品描述
      placeholder: "简要描述产品定位和核心功能"
    validations:
      required: true

  - type: checkboxes
    id: platforms
    attributes:
      label: 目标平台
      options:
        - label: iOS
        - label: macOS
        - label: watchOS
        - label: visionOS

  - type: input
    id: min-version
    attributes:
      label: 最低系统版本
      placeholder: "例如：iOS 17+ / macOS 15+"
    validations:
      required: true

  - type: dropdown
    id: distribution
    attributes:
      label: 分发方式
      options:
        - App Store
        - TestFlight
        - 直接分发（DMG / PKG）
        - 暂未确定
    validations:
      required: true

  # ── 基础决策 ──
  - type: markdown
    attributes:
      value: |
        ---
        # 基础技术决策

  # 数据持久化
  - type: dropdown
    id: data-persistence
    attributes:
      label: 数据持久化方案
      description: "SwiftData 适合本地优先、iCloud 同步场景；Supabase 适合远端优先、多端实时同步场景。"
      options:
        - SwiftData + iCloud（本地优先，CloudKit 自动同步）
        - Supabase（SaaS 远端优先，PostgreSQL）
        - Core Data + CloudKit
        - 无需持久化
    validations:
      required: true

  - type: textarea
    id: data-persistence-notes
    attributes:
      label: 数据持久化备注
      placeholder: "补充说明，例如需要同步的数据类型、离线优先需求等"

  # 多语言
  - type: dropdown
    id: localization
    attributes:
      label: 多语言支持
      description: "是否需要支持多语言？推荐使用 String Catalogs（.xcstrings）实现。"
      options:
        - 中文（简体）+ 英文
        - 仅中文（简体）
        - 仅英文
        - 多语言（3 种以上）
        - 暂不需要
    validations:
      required: true

  - type: textarea
    id: localization-notes
    attributes:
      label: 多语言备注
      placeholder: "如需支持特定语言，请在此说明"

  # ── 增强功能 ──
  - type: markdown
    attributes:
      value: |
        ---
        # 增强功能

  # 内购
  - type: dropdown
    id: iap
    attributes:
      label: 内购方案
      description: |
        统一采用 RevenueCat 进行内购管理。
        一次性买断适合工具类 App；订阅制适合持续服务型 App。
      options:
        - 一次性买断（Lifetime）
        - 订阅制（月度 + 年度）
        - 一次性买断 + 订阅制
        - 免费（无内购）
        - 暂未确定
    validations:
      required: true

  - type: textarea
    id: iap-notes
    attributes:
      label: 内购备注
      placeholder: "预期价格设置、Pro 权益范围、付费墙入口位置等"

  # 版本更新
  - type: dropdown
    id: update-check
    attributes:
      label: 版本更新提示
      description: "App Store 分发自带更新机制；直接分发需要自建检查。"
      options:
        - App Store 自动更新
        - Sparkle 框架（macOS 直接分发）
        - 手动检查 GitHub Release
        - 暂不需要
    validations:
      required: true

  # 反馈渠道
  - type: checkboxes
    id: feedback
    attributes:
      label: 反馈渠道
      description: "选择需要集成的用户反馈渠道"
      options:
        - label: GitHub Issues
        - label: 应用内反馈表单
        - label: 邮件反馈
        - label: 暂不需要

  # Onboarding
  - type: dropdown
    id: onboarding
    attributes:
      label: Onboarding 引导流程
      options:
        - TipKit 提示引导
        - 全屏引导页（Welcome Screen）
        - 不需要
        - 暂未确定
    validations:
      required: true

  # 通知
  - type: dropdown
    id: notifications
    attributes:
      label: 推送通知
      description: "本地通知无需服务端；远程推送需要 APNs 配置。"
      options:
        - 本地通知
        - 远程推送（APNs）
        - 不需要
        - 暂未确定
    validations:
      required: true

  - type: textarea
    id: notification-notes
    attributes:
      label: 通知备注
      placeholder: "通知触发场景，例如：用量超过阈值时提醒"

  # ── Out of Scope ──
  - type: markdown
    attributes:
      value: |
        ---
        # Out of Scope

  - type: textarea
    id: out-of-scope
    attributes:
      label: 不在范围内的功能
      placeholder: |
        列出明确不做的功能，例如：
        - 用户账号登录/注册
        - 多账号切换
        - Windows / Linux 平台支持

  # ── 补充说明 ──
  - type: markdown
    attributes:
      value: |
        ---

  - type: textarea
    id: additional-notes
    attributes:
      label: 补充说明
      placeholder: "其他需要记录的产品或技术决策"
